syntax = "proto3";

package ordering.v1;

option go_package = "coursework/proto/gen/ordering/v1;orderingv1";

// OrderingService exposes order creation over gRPC, as a second adapter
// alongside the HTTP REST wrapper - both sit in front of the same domain
// service (coursework/ordering/domain.OrderService).
service OrderingService {
  rpc CreateOrder(CreateOrderRequest) returns (Order);
}

message CreateOrderRequest {
  string sku = 1;
  int32 quantity = 2;
}

message Order {
  string id = 1;
  string sku = 2;
  int32 quantity = 3;
  string status = 4;
  string failure_reason = 5;
  string created_at = 6;
}
